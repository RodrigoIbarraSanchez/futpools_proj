        var s = document.createElement('script');

        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-BJ5WNM9T05';

        window.dataLayer = window.dataLayer || [];
        window.gtag = function () { dataLayer.push(arguments); };
        gtag('js', new Date());
        gtag('config', 'G-BJ5WNM9T05', { send_page_view: false });
      })();
    </script>
